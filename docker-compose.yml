mongodb:
    image: mongo:latest
    container_name: money-tracker-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: money-tracker
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
app:
    image: expense-tracker-test:latest
    container_name: money-tracker-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.domain=bloomskilltech.in
      - traefik.http.routers.coincompass.rule=Host(`coincompass.sathishkumar.cloud`)
      - traefik.http.routers.coincompass.entrypoints=websecure
      - traefik.http.routers.coincompass.tls=true
      - traefik.http.routers.coincompass.tls.certresolver=myresolver
      - traefik.http.services.coincompass.loadbalancer.server.port=4000
    env_file:
      - ./server/.env
    networks:
      - default

volumes:
  mongo-data:

networks:
  default:
    name: traefik
    external: true
